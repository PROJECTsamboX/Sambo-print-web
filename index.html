    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { 
            height: 100%; overflow: hidden; font-family: 'Courier New', monospace; 
            background: #000; color: #00ff41;
        }
        #canvas-container { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1;
        }
        /* UI Overlay */
        .ui-overlay { 
            position: fixed; z-index: 1000; pointer-events: none; 
            width: 100%; height: 100%;
        }
        .hud { 
            position: absolute; background: rgba(0,0,0,0.85); 
            backdrop-filter: blur(20px); border: 1px solid #00ff41; 
            border-radius: 16px; padding: 2rem; 
            pointer-events: auto; transition: all 0.4s;
        }
        .hud-top-left { top: 2rem; left: 2rem; min-width: 300px; }
        .hud-top-right { top: 2rem; right: 2rem; text-align: right; }
        .hud-center { top: 50%; left: 50%; transform: translate(-50%, -50%); min-width: 500px; }
        .hud-bottom { bottom: 2rem; left: 50%; transform: translateX(-50%); }
        .ninja-title { 
            font-size: clamp(2.5rem, 6vw, 5rem); 
            background: linear-gradient(45deg, #00ff41, #00ccff, #ff0080);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 1rem; text-align: center;
            filter: drop-shadow(0 0 30px #00ff41);
            animation: titleGlow 3s ease-in-out infinite alternate;
        }
        @keyframes titleGlow {
            0% { filter: drop-shadow(0 0 20px #00ff41); transform: scale(1); }
            100% { filter: drop-shadow(0 0 60px #00ff41) drop-shadow(0 0 80px #00ccff); transform: scale(1.02); }
        }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 1.5rem; margin-top: 2rem; }
        .stat { text-align: center; }
        .stat-value { font-size: 2.5rem; font-weight: bold; display: block; }
        .btn { 
            background: linear-gradient(45deg, #00ff41, #00ccff); 
            border: none; padding: 1rem 2rem; border-radius: 50px; 
            color: #000; font-weight: bold; cursor: pointer; 
            font-size: 1.1rem; transition: all 0.3s; 
            box-shadow: 0 10px 30px rgba(0,255,65,0.4);
            pointer-events: auto;
        }
        .btn:hover { 
            transform: translateY(-5px) scale(1.05); 
            box-shadow: 0 20px 50px rgba(0,255,65,0.6);
        }
        .btn-secondary { background: linear-gradient(45deg, #ff0080, #ff6b9d); box-shadow: 0 10px 30px rgba(255,0,128,0.4); }
        .btn-secondary:hover { box-shadow: 0 20px 50px rgba(255,0,128,0.6); }
        /* Particles UI */
        .particles-ui { position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; }
        .particle-ui { 
            position: absolute; width: 4px; height: 4px; 
            background: #00ff41; border-radius: 50%; 
            box-shadow: 0 0 15px #00ff41; animation: particleFloat 8s infinite linear;
        }
        @keyframes particleFloat {
            0% { transform: translateY(100vh) scale(0) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-20px) scale(1.5) rotate(720deg); opacity: 0; }
        }
        /* Chatbot */
        .chatbot { 
            position: absolute; bottom: 3rem; right: 3rem; 
            width: 380px; height: 480px; background: rgba(0,0,0,0.95); 
            border: 2px solid #00ff41; border-radius: 20px; 
            transform: scale(0); transform-origin: bottom right;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }
        .chatbot.active { transform: scale(1); }
        .chat-header { 
            background: linear-gradient(45deg, #00ff41, #00ccff); 
            color: #000; padding: 1.5rem; text-align: center; 
            border-radius: 18px 18px 0 0; cursor: pointer; font-weight: bold;
        }
        .chat-body { height: 320px; overflow-y: auto; padding: 1.5rem; }
        .message { margin-bottom: 1rem; padding: 1rem; border-radius: 18px; max-width: 85%; }
        .message.ai { background: rgba(0,255,65,0.2); margin-right: auto; }
        .message.user { background: linear-gradient(45deg, #00ff41, #00ccff); color: #000; margin-left: auto; }
        .chat-input { display: flex; padding: 1.5rem; gap: 1rem; }
        .chat-input input { flex: 1; padding: 1rem; background: rgba(255,255,255,0.1); border: 1px solid #00ff41; border-radius: 25px; color: #fff; }
        /* Responsive */
        @media (max-width: 768px) {
            .hud-top-left, .hud-top-right { position: fixed; top: 1rem; }
            .hud-top-left { left: 1rem; }
            .hud-top-right { right: 1rem; }
            .chatbot { width: 90vw; right: 5vw; bottom: 1rem; }
        }
    </style>
</head>
<body>

    <div id="canvas-container"></div>
    
    <!-- UI Overlay -->

        <!-- Bottom Chatbot -->
        <div class="chatbot" id="chatbot">

    <script>
        // === 3D WEBGL SCENE ===
        let scene, camera, renderer, controls, ninjaGroup, particles;
        let mouseX = 0, mouseY = 0;
        let time = 0;

        function init3D() {
            // Scene
            scene = new THREE.Scene();
            scene.fog = new THREE.Fog(0x000000, 1, 1000);

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 2000);
            camera.position.z = 5;

            // Renderer
            const container = document.getElementById('canvas-container');
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            renderer.shadowMap.enabled = true;
            renderer.shadowMap.type = THREE.PCFSoftShadowMap;
            container.appendChild(renderer.domElement);

            // Controls
            controls = new THREE.OrbitControls(camera, renderer.domElement);
            controls.enableDamping = true;
            controls.dampingFactor = 0.05;

            // Lighting
            const ambientLight = new THREE.AmbientLight(0x404040, 0.4);
            scene.add(ambientLight);
            
            const pointLight = new THREE.PointLight(0x00ff41, 2, 100);
            pointLight.position.set(0, 5, 5);
            pointLight.castShadow = true;
            scene.add(pointLight);

            // Ninja Shuriken (Geometry)
            const shurikenGeometry = new THREE.BufferGeometry();
            const shurikenVertices = [];
            for(let i = 0; i < 12; i++) {
                const angle = (i / 12) * Math.PI * 2;
                shurikenVertices.push(
                    Math.cos(angle) * 0.5, Math.sin(angle) * 0.5, 0,
                    Math.cos(angle + Math.PI/6) * 0.3, Math.sin(angle + Math.PI/6) * 0.3, 0
                );
            }
            shurikenGeometry.setAttribute('position', new THREE.Float32BufferAttribute(shurikenVertices, 3));
            
            // Create ninja fleet
            ninjaGroup = new THREE.Group();
            for(let i = 0; i < 50; i++) {
                const shuriken = new THREE.Mesh(shurikenGeometry, new THREE.MeshPhongMaterial({ 
                    color: new THREE.Color().setHSL(0.33 + Math.random()*0.3, 1, 0.7),
                    emissive: 0x002200, shininess: 100
                }));
                shuriken.position.set(
                    (Math.random() - 0.5) * 20,
                    (Math.random() - 0.5) * 20,
                    (Math.random() - 0.5) * 20
                );
                shuriken.rotation.set(Math.random()*Math.PI, Math.random()*Math.PI, Math.random()*Math.PI);
                shuriken.userData = { speed: 0.01 + Math.random()*0.03 };
                ninjaGroup.add(shuriken);
            }
            scene.add(ninjaGroup);

            // Particle System 10K
            const particleCount = 10000;
            const positions = new Float32Array(particleCount * 3);
            for(let i = 0; i < particleCount; i++) {
                positions[i*3] = (Math.random() - 0.5) * 2000;
                positions[i*3 + 1] = (Math.random() - 0.5) * 2000;
                positions[i*3 + 2] = (Math.random() - 0.5) * 2000;
            }
            const particleGeometry = new THREE.BufferGeometry();
            particleGeometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            
            const particleMaterial = new THREE.PointsMaterial({
                color: 0x00ff41,
                size: 3,
                transparent: true,
                opacity: 0.8,
                blending: THREE.AdditiveBlending
            });
            particles = new THREE.Points(particleGeometry, particleMaterial);
            scene.add(particles);

            // Central Ninja Core
            const coreGeometry = new THREE.SphereGeometry(1.5, 32, 32);
            const coreMaterial = new THREE.MeshPhongMaterial({
                color: 0x00ff41,
                emissive: 0x004400,
                shininess: 100,
                transparent: true,
                opacity: 0.9
            });
            const core = new THREE.Mesh(coreGeometry, coreMaterial);
            core.position.set(0, 0, 0);
            core.castShadow = true;
            scene.add(core);

            // Mouse tracking
            document.addEventListener('mousemove', onMouseMove);
            window.addEventListener('resize', onWindowResize);
            
            animate();
        }

        function onMouseMove(event) {
            mouseX = (event.clientX / window.innerWidth) * 2 - 1;
            mouseY = -(event.clientY / window.innerHeight) * 2 + 1;
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        }

        function animate() {
            requestAnimationFrame(animate);
            
            time += 0.01;
            
            // Rotate ninjas
            ninjaGroup.rotation.x += 0.005;
            ninjaGroup.rotation.y += 0.008;
            
            ninjaGroup.children.forEach((ninja, i) => {
                ninja.rotation.x += ninja.userData.speed;
                ninja.rotation.y += ninja.userData.speed * 1.5;
                ninja.rotation.z += ninja.userData.speed * 0.7;
                
                // Orbit around center
                const radius = 8 + Math.sin(time + i) * 2;
                ninja.position.x = Math.cos(time * 2 + i) * radius;
                ninja.position.y = Math.sin(time * 1.5 + i) * radius * 0.5;
                ninja.position.z = Math.sin(time * 3 + i) * radius * 0.3;
            });

            // Mouse attraction
            const core = scene.children.find(child => child.geometry && child.geometry.type === 'SphereGeometry');
            if (core) {
                core.rotation.x += mouseY * 0.1;
                core.rotation.y += mouseX * 0.1;
                core.scale.setScalar(1 + Math.sin(time * 5) * 0.1);
            }

            // Particles
            const positions = particles.geometry.attributes.position.array;
            for(let i = 0; i < positions.length; i += 3) {
                positions[i + 1] -= 0.5 + Math.sin(time + i) * 0.1;
                if (positions[i + 1] < -500) positions[i + 1] = 500;
            }
            particles.geometry.attributes.position.needsUpdate = true;

            controls.update();
            renderer.render(scene, camera);
        }

        // === UI FUNCTIONS ===
        let ninjaCount = 1337;
        function updateStats() {
            ninjaCount += Math.floor(Math.random() * 5);
            document.getElementById('ninja-count').textContent = ninjaCount.toLocaleString();
        }
        setInterval(updateStats, 3000);

        // Chatbot AI
        const responses = [
            "Ninja
